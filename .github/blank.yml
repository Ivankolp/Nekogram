name: Build Nekogram APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Позволяет запускать сборку вручную кнопкой

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Очищаем место на диске, чтобы сборка не вылетела
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: false # Оставляем SDK, он нам нужен
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap: true

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Собираем DEBUG версию (она не требует ключей и API ID для самой сборки)
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      # Сохраняем готовый файл, чтобы его можно было скачать
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Nekogram-Debug-APK
          path: TMessagesProj/build/outputs/apk/debug/*.apk